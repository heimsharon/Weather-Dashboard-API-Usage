<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.3.1/css/all.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/src/styles/index.css" />
    <title>Weather Dashboard</title>
  </head>

  <body>
    <div class="container">
      <!-- Header -->
      <header class="weather-header">
        <h1>Weather Dashboard</h1>
      </header>

      <div class="dashboard-layout">
        <!-- Sidebar for search form and history -->
        <aside class="weather-search-container">
          <h2 class="search-heading">Search for a City:</h2>
          <p class="search-instructions">
            Enter a city name to get the current weather and 5-day forecast.
          </p>
          <form id="search-form" class="search-form" autocomplete="on">
            <input
              class="weather-search-box"
              type="text"
              id="search-input"
              placeholder="San Diego"
              aria-labelledby="search-heading"
              aria-controls="today forecast"
              required
            />
            <button
              type="submit"
              class="search-button"
              id="search-button"
              aria-label="submit search"
            >
              Search
            </button>
          </form>

          <section class="history-container">
            <h2 class="history-heading">Recent Searches:</h2>
            <p class="history-instructions">
              Click on a city to view its weather details.
            </p>
            <ul id="history-list" class="history-list">
              <!-- Search history items will be dynamically added here -->
            </ul>
            <button
              id="delete-selected-city"
              class="history-btn"
              aria-label="Delete selected city from history."
            >
              Delete City
            </button>
            <button
              id="clear-history"
              class="history-btn"
              aria-label="Clear all search history"
            >
              Clear History
            </button>
          </section>
        </aside>

        <!-- Main content area for current weather and 5-day forecast -->
        <main class="main-content">
          <section aria-live="polite">
            <div class="card">
              <div class="card-body" id="today">
                <h2 class="card-title" id="search-title">
                  Search for a city!
                  <img
                    id="weather-img"
                    class="weather-img"
                    alt="Weather icon"
                  />
                </h2>
                <p id="temp">Temperature: °F</p>
                <p id="wind">Wind: MPH</p>
                <p id="humidity">Humidity: %</p>
              </div>
            </div>
          </section>
          <section
            id="forecast"
            class="forecast-row"
            aria-live="polite"
          ></section>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
